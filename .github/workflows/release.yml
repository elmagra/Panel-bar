name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish PanelTray
        run: >
          dotnet publish ./src/PanelTray/PanelTray.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o ./publish

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path ./publish/PanelTray.exe -DestinationPath ./PanelTray-${{ github.ref_name }}-win-x64.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./PanelTray-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
